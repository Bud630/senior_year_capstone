<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch This</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Overlay that triggers autoplay with sound -->
  <div id="overlay" onclick="startVideo()">
    <div class="overlay-content">
      <h2>You've been invited!</h2>
      <p>Click anywhere to continue</p>
    </div>
  </div>

  <header>
    <h1>Watch This</h1>
  </header>

  <main>
    <div class="video-container">
      <div class="video-wrapper" id="video-wrapper">
        <video id="video" playsinline preload="auto">
          <source src="YTDown.com_YouTube_Rick-Astley-Never-Gonna-Give-You-Up-Offi_Media_dQw4w9WgXcQ_001_1080p.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 Watch This
  </footer>

  <script>
    function startVideo() {
      document.getElementById('overlay').style.display = 'none';
      var video = document.getElementById('video');
      video.play();
    }
  </script>
</body>
</html>
